<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DayStride</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="#"> 
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="6" fill="#0f1724" />
            <path d="M7 13c1.5-3 4-4 6-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="brand-text">DayStride</span>
        </a>

        <nav class="nav">
          <a href="#" class="nav-link">Home</a>
          <a href="#features" class="nav-link">Features</a>
          <a href="#" class="nav-link">Docs</a>
        </nav>

        <div class="nav-actions">
          <a class="btn btn-ghost" href="#">Sign in</a>
          <a class="btn btn-primary" href="#">Try it</a>
        </div>
      </div>
    </header>

    <main class="app container">
      <div class="hero">
        <div>
          <h1>DayStride</h1>
          <p class="subtitle">Plan your day, prioritize what matters, and get more done.</p>
        </div>
        <div class="hero-cta">
          <a class="btn btn-primary" href="#task-form">Add a task</a>
        </div>
      </div>

      <section class="card">
        <form id="task-form" class="task-form">
          <label>
            Task
            <input id="task-name" type="text" placeholder="Write report" required maxlength="80" />
          </label>
          <label>
            Duration (minutes)
            <input id="task-duration" type="number" min="5" step="5" value="30" required />
          </label>
          <label>
            Priority
            <select id="task-priority">
              <option value="3">High</option>
              <option value="2" selected>Medium</option>
              <option value="1">Low</option>
            </select>
          </label>
          <button class="btn btn-primary" type="submit">Add task</button>
        </form>

        <section class="summary" id="summary" aria-live="polite"></section>

        <ol id="task-list" class="task-list" aria-live="polite"></ol>
        <button id="clear-btn" type="button" class="btn btn-danger clear-btn">Clear all</button>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <span>© <span id="year"></span> DayStride — Simple productivity tools for focused work.</span>
      </div>
    </footer>

    <script>
      // set year in footer
      try { document.getElementById('year').textContent = new Date().getFullYear(); } catch(e){}
    </script>

    <script src="script.js"></script>
  </body>
</html>
